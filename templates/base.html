<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recipe Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
min-height:100vh;
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
}

.navbar-brand{
font-size:22px;
font-weight:600;
color:#ff9f43 !important;
}

/* HERO */

.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
font-size:48px;
font-weight:700;
background:linear-gradient(45deg,#ff9f43,#ff5e62);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* GLASS CARD */

.glass-card{
background:rgba(255,255,255,0.06);
border-radius:20px;
padding:25px;
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* BUTTON */

.btn-premium{
background:linear-gradient(45deg,#ff9f43,#ff5e62);
border:none;
color:white;
padding:10px 20px;
border-radius:10px;
}

/* INGREDIENT TAG */

.tag{
display:inline-block;
background:#ff9f43;
padding:4px 10px;
border-radius:20px;
font-size:11px;
margin:3px;
}

/* ===== FLIP CARD ===== */

.flip-card{
width:100%;
height:420px;
perspective:1200px;
}

.flip-card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.7s;
transform-style:preserve-3d;
}

.flip-card:hover .flip-card-inner{
transform:rotateY(180deg);
}

.flip-card-front,
.flip-card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:18px;
background:rgba(255,255,255,0.05);
overflow:hidden;
}

.flip-card-front img{
width:100%;
height:200px;
object-fit:cover;
}

.flip-card-back{
transform:rotateY(180deg);
padding:20px;
}

.flip-card-back{
transform:rotateY(180deg);
padding:20px;
display:flex;
flex-direction:column;
height:100%;
}

.read-more{
color:#ff9f43;
font-weight:600;
text-decoration:none;
}

.read-more:hover{
color:#ffa94d;
}
.footer{
text-align:center;
margin-top:60px;
padding:20px;
color:#aaa;
}

</style>

</head>

<body>

<nav class="navbar">
<div class="container">
<span class="navbar-brand">🍽 Recipe Hub</span>
</div>
</nav>

<div class="hero">
<h1>Recipe Hub</h1>
<p>Discover • Cook • Share Amazing Recipes</p>
</div>

{% block start %}

{% endblock %}

<div class="footer">
Made with ❤️ using Django
</div>

</body>
</html>
