{% extends 'base.html' %}

{% block start %}

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <div class="upload-card">
                
                <div class="text-center mb-4">
                    <h2 class="brand-font fw-bold mb-1 text-dark">Update Recipe</h2>
                    <p class="text-muted small">Make changes to "{{ recipe.recipe_name }}"</p>
                </div>
                
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="small text-muted mb-1 fw-medium">Recipe Title</label>
                            <input name="recipe_name" class="form-control" value="{{ recipe.recipe_name }}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="small text-muted mb-1 fw-medium">Update Cover Image (Optional)</label>
                            <input type="file" name="recipe_image" class="form-control">
                            
                            {% if recipe.recipe_image %}
                                <div class="small text-muted mt-2">
                                    Current Image: <a href="{{ recipe.recipe_image.url }}" target="_blank" class="text-decoration-none" style="color: var(--accent);">View</a>
                                </div>
                            {% endif %}
                        </div>
                        
                        <div class="col-12">
                            <label class="small text-muted mb-1 fw-medium">Ingredients</label>
                            <textarea name="recipe_ingredients" class="form-control" rows="2" required>{{ recipe.recipe_ingredients }}</textarea>
                        </div>
                        
                        <div class="col-12">
                            <label class="small text-muted mb-1 fw-medium">Preparation Method</label>
                            <textarea name="recipe_description" class="form-control" rows="5" required>{{ recipe.recipe_description }}</textarea>
                        </div>
                        
                        <div class="col-12 d-flex gap-3 justify-content-center mt-5 pt-3 border-top">
                            <button type="submit" class="btn btn-brand px-5 py-2">Save Changes</button>
                            <a href="/" class="btn btn-outline-secondary px-5 py-2">Cancel</a>
                        </div>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}
