{% extends 'base.html' %}

{% block start %}

<div class="container mt-5 mb-5 pb-5">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-12 col-md-10 col-lg-7">

            <div class="upload-card shadow-lg" style="border-top: 4px solid var(--accent);">
                
                <div class="text-center mb-5">
                    <h2 class="brand-font fw-bold mb-2 text-dark">Join the Community</h2>
                    <p class="text-muted small">Create an account to publish and share your favorite dishes.</p>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-warning py-2 small border-0" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="post" action="/register/">
                    {% csrf_token %}
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="small text-muted mb-1 fw-medium">First Name</label>
                            <input type="text" name="first_name" class="form-control" placeholder="e.g. Gordon" required>
                        </div>
                        <div class="col-md-6">
                            <label class="small text-muted mb-1 fw-medium">Last Name</label>
                            <input type="text" name="last_name" class="form-control" placeholder="e.g. Ramsay" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="small text-muted mb-1 fw-medium">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Choose a unique username" required>
                    </div>

                    <div class="mb-3">
                        <label class="small text-muted mb-1 fw-medium">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="hello@example.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="small text-muted mb-1 fw-medium">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
                    </div>
                    
                    <div class="mt-5">
                        <button type="submit" class="btn btn-brand w-100 py-2 fs-6">Create Account</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-4 border-top">
                    <p class="small text-muted mb-0">
                        Already have an account? 
                        <a href="/login/" class="text-decoration-none fw-bold" style="color: var(--accent);">Sign In</a>
                    </p>
                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
