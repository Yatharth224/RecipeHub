{% extends 'base.html' %}

{% block start %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="glass-card">

<h3 class="mb-4 text-center">✏️ Update Recipe</h3>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<!-- Recipe Name -->

<div class="mb-3">

<label class="form-label">Recipe Name</label>

<input
name="recipe_name"
value="{{ recipe.recipe_name }}"
required
type="text"
class="form-control"
>

</div>


<!-- Description -->

<div class="mb-3">

<label class="form-label">Recipe Description</label>

<textarea
name="recipe_description"
class="form-control"
rows="3"
required
>{{ recipe.recipe_description }}</textarea>

</div>


<!-- Ingredients -->

<div class="mb-3">

<label class="form-label">Ingredients</label>

<textarea
name="recipe_ingredients"
class="form-control"
rows="2"
placeholder="Example: Tomato, Onion, Garlic"
required
>{{ recipe.recipe_ingredients }}</textarea>

</div>


<!-- Image -->

<div class="mb-3">

<label class="form-label">Recipe Image</label>

<input
name="recipe_image"
type="file"
class="form-control"
>

</div>


<!-- Current Image -->

{% if recipe.recipe_image %}

<div class="mb-3">

<label class="form-label">Current Image</label>

<br>

<img
src="{{ recipe.recipe_image.url }}"
style="max-height:150px;border-radius:10px;"
>

</div>

{% endif %}


<!-- Buttons -->

<div class="d-grid gap-2">

<button type="submit" class="btn-premium">

Update Recipe

</button>

<a href="/recipes/" class="btn btn-secondary">

Back to Recipes

</a>

</div>


</form>

</div>

</div>

</div>

</div>

{% endblock %}
